name: Auto Dev Global Agent

on:
  schedule:
    - cron: '*/10 * * * *'
  workflow_dispatch:

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 55

    steps:
      - name: Checkout orchestrator repo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Claude Code CLI
        run: npm install -g @anthropic-ai/claude-code

      - name: Process pending issues across all repos
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
          ANTHROPIC_API_KEY: ${{ secrets.AI_AGENT_API_KEY }}
          GH_USERNAME: ${{ secrets.GH_USERNAME }}
        run: |
          set -euo pipefail

          ISSUES=$(gh api -X GET \
            "search/issues?q=is:issue+is:open+label:auto-dev+-label:implementing+-label:implemented+user:${GH_USERNAME}&per_page=20" \
            --jq '.items | map({number:.number, title:.title, body:.body, repo:.repository_url}) | .[]')

          if [ -z "$ISSUES" ]; then
            echo "No pending issues found."
            exit 0
          fi

          echo "$ISSUES" | jq -c '.' | while read -r ISSUE; do
            NUMBER=$(echo "$ISSUE" | jq -r '.number')
            TITLE=$(echo  "$ISSUE" | jq -r '.title')
            BODY=$(echo   "$ISSUE" | jq -r '.body // ""')
            REPO_FULL=$(echo "$ISSUE" | jq -r '.repo' | sed 's|https://api.github.com/repos/||')

            echo "--- Issue #$NUMBER in $REPO_FULL: $TITLE ---"

            gh issue edit "$NUMBER" --repo "$REPO_FULL" --add-label "implementing" 2>/dev/null || true

            WORK_DIR="work-${NUMBER}"

            (
              set -e

              git clone \
                "https://x-access-token:${GH_TOKEN}@github.com/${REPO_FULL}.git" \
                "$WORK_DIR"
              cd "$WORK_DIR"

              git checkout preprod 2>/dev/null || {
                git checkout -b preprod
                git push "https://x-access-token:${GH_TOKEN}@github.com/${REPO_FULL}.git" preprod
              }

              SLUG=$(echo "$TITLE" \
                | tr '[:upper:]' '[:lower:]' \
                | tr ' ' '-' \
                | tr -dc '[:alnum:]-' \
                | cut -c1-50)
              BRANCH="auto/issue-${NUMBER}-${SLUG}"
              git checkout -b "$BRANCH"

              # Write prompt to a temp file to avoid shell quoting issues
              PROMPT_FILE=$(mktemp)
              {
                cat ../.github/prompts/auto-dev-system.md
                printf '\n\n---\n\n## Issue #%s\n\n**%s**\n\n%s\n' \
                  "$NUMBER" "$TITLE" "$BODY"
              } > "$PROMPT_FILE"

              claude --dangerously-skip-permissions -p "$(cat "$PROMPT_FILE")"
              rm -f "$PROMPT_FILE"

              git config user.name  "auto-dev-bot"
              git config user.email "auto-dev-bot@users.noreply.github.com"
              git add -A

              if git diff --cached --quiet; then
                echo "No file changes for issue #$NUMBER"
                exit 1
              fi

              git commit -m "$(printf 'feat: implement issue #%s\n\n%s\n\nAuto-implemented by auto-dev-agent.\nIssue: https://github.com/%s/issues/%s' \
                "$NUMBER" "$TITLE" "$REPO_FULL" "$NUMBER")"

              REMOTE="https://x-access-token:${GH_TOKEN}@github.com/${REPO_FULL}.git"
              git push "$REMOTE" "$BRANCH"

              git checkout preprod
              git merge --no-ff "$BRANCH" -m "merge: ${BRANCH} into preprod"
              git push "$REMOTE" preprod

            ) && STATUS="success" || STATUS="failure"

            rm -rf "$WORK_DIR"

            if [ "$STATUS" = "success" ]; then
              COMMENT=$(printf '**Auto Dev Agent** - implementation complete\n\nBranch: `%s`\nMerged into: `preprod`\n\nReview the changes before merging to `main`.' \
                "auto/issue-${NUMBER}-$(echo "$TITLE" | tr '[:upper:]' '[:lower:]' | tr ' ' '-' | tr -dc '[:alnum:]-' | cut -c1-50)")
              gh issue comment "$NUMBER" --repo "$REPO_FULL" --body "$COMMENT"
              gh issue edit "$NUMBER" --repo "$REPO_FULL" \
                --add-label "implemented" \
                --remove-label "auto-dev" \
                --remove-label "implementing" 2>/dev/null || true
            else
              RUN_URL="https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"
              COMMENT=$(printf '**Auto Dev Agent** - implementation failed\n\nSee logs: %s\n\nRemove and re-add the `auto-dev` label to retry.' "$RUN_URL")
              gh issue comment "$NUMBER" --repo "$REPO_FULL" --body "$COMMENT"
              gh issue edit "$NUMBER" --repo "$REPO_FULL" \
                --remove-label "implementing" 2>/dev/null || true
            fi

          done
